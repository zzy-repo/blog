<!doctype html>
<html lang="{{ site.Language.Lang | default `zh-cn` }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <link rel="stylesheet" href="{{ `style.css` | relURL }}">
    {{ if and .IsPage (eq .Section `posts`) }}
      <link rel="stylesheet" href="{{ `github-markdown-light.css` | relURL }}">
      <link rel="stylesheet" href="{{ `github-article.css` | relURL }}">
    {{ end }}
  </head>
  <body class="page-kind-{{ .Kind }}{{ if .IsHome }} is-home{{ end }}{{ if eq .Section `posts` }} section-posts{{ end }}">
    <header class="site-chrome">
      <div class="site-container compact-header">
        <a class="compact-brand" href="{{ `/` | relURL }}">{{ site.Title }}</a>
        <nav class="compact-nav" aria-label="主导航">
          {{ partial "site-nav.html" (dict "page" .) }}
        </nav>
      </div>
    </header>

    {{ if .IsHome }}
      <div class="site-hero">
        <div class="site-container site-branding">
          <a class="site-title" href="{{ `/` | relURL }}">{{ site.Title }}</a>
          <p class="site-description">{{ site.Params.description }}</p>
        </div>
      </div>
    {{ end }}

    <main class="site-content">
      <div class="site-container">
        {{ block "main" . }}{{ end }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-container">
        <p>{{ now.Format "2006" }} {{ site.Title }}. Powered by Hugo.</p>
      </div>
    </footer>
  </body>
</html>
