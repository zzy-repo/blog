<!doctype html>
<html lang="{{ site.Language.Locale | default `zh-cn` }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <link rel="stylesheet" href="{{ `style.css` | relURL }}">
  </head>
  <body class="page-kind-{{ .Kind }}{{ if .IsHome }} is-home{{ end }}{{ if eq .Section `posts` }} section-posts{{ end }}">
    <div class="site-chrome">
      <div class="topbar">
        <div class="site-container">
          <nav class="top-nav" aria-label="辅助导航">
            {{ partial "site-nav.html" (dict "page" .) }}
          </nav>
        </div>
      </div>

      <header class="site-header">
        <div class="site-container site-branding">
          <a class="site-title" href="{{ `/` | relURL }}">{{ site.Title }}</a>
          <p class="site-description">{{ site.Params.description }}</p>
        </div>

        <div class="main-nav-shell">
          <div class="site-container">
            <nav class="main-nav" aria-label="主导航">
              {{ partial "site-nav.html" (dict "page" .) }}
            </nav>
          </div>
        </div>
      </header>
    </div>

    <main class="site-content">
      <div class="site-container">
        {{ block "main" . }}{{ end }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-container">
        <p>{{ now.Format "2006" }} {{ site.Title }}. Powered by Hugo.</p>
      </div>
    </footer>
  </body>
</html>
